<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzas</title>
    <link href="pizzas.css" rel="stylesheet" />
</head>
<body>
    <nav>
        <a href="pizzaria.html">Home</a>
        <a href="">Pizzas</a>
        <a href="cmd.html">Comanda</a>
        <a href="">Funcionarios</a>
        <a href="">Cargos</a>
        <a href="">Usuario</a>
    </nav>
    <div id="img">
        <div id="titulo"></div>
    </div>
    <div class="form">
        <form action="">
            <h1>Nova Pizza</h1>
            <input type="text" id="nome" placeholder="Nome"><br><br>
            <input type="text" id="ingredientes" placeholder="ingredientes"><br><br>
            <input type="text" id="valor" placeholder="valor"><br><br>
            <select id="status">
                <option value="Disponivel">Disponivel</option>
                <option value="Indisponivel">Indisponivel</option>
            </select><br><br>
            <select id="sabor">
                <option value="doce">Doce</option>
                <option value="salgado">Salgado</option>
                <option value="fit">Fit</option>
                <option value="vegetariana">Vegetariana</option>
            </select><br><br>
            <button class="btncadastro" id="btncadastro">Cadastrar</button><br><br>
        </form>
        <div class="lista-tabela">
            <h2>Lista de Pizza</h2>
            <table class="table">

                <tbody>
                    <tr>
                        <th>Codigo</th>
                        <th>Nome</th>
                        <th>Ingrediente</th>
                        <th>Status</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                    </tr>
                    <br>
                    <tr>
                        <td class="td">trtre</td>
                        <td class="td">Cleriston Trajano da Silva</td>
                        <td class="td">gdfgf</td>
                        <td class="td">vbvcb</td>
                        <td class="td">Antony Pedro</td>
                        <td class="td">patricia Rodrigues</td>
                        <td class="btn-excluir"><a href="">Excluir</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="pizzas.js"></script>
</body>
</html>
<!--
    AUTO_INCREMENT → gera ID automático (recomendado como chave primária).
PRIMARY KEY → identifica unicamente cada linha.
NOT NULL → campo obrigatório.
UNIQUE → não permite valores repetidos (ex: email, cpf).
DEFAULT → valor padrão se não informar.
FOREIGN KEY → cria relação entre tabelas (importante para integridade).
    -->
